[kivy]
# Kivy Configuration for Urban Kettle on Raspberry Pi

# Graphics settings
fullscreen = auto
window_state = visible
minimum_width = 1024
minimum_height = 600

# Touch/Input settings for Raspberry Pi touchscreen
[input]
# Enable multi-touch
mouse = mouse,disable_multitouch
mtdev_%(name)s = probesysfs,provider=mtdev
hid_%(name)s = probesysfs,provider=hidinput

# Graphics settings for performance
[graphics]
multisamples = 0
maxfps = 60

# Window configuration
[modules]
# Disable unnecessary modules for better performance
inspector = 
touchring = 
monitor =
